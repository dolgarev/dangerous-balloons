name: Build and Release Dangerous Balloons

on:
  push:
    tags:
      - 'v*' # Trigger only when a version tag is created, e.g., v1.0.0

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
            os: ubuntu-latest
          - arch: arm64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    container:
      image: ${{ matrix.arch == 'arm64' && 'debian:trixie' || 'ubuntu:latest' }}
    permissions:
      contents: read
    
    steps:
      - name: Install Build Dependencies
        run: |
          apt-get update
          apt-get install -y git gnat gprbuild libncursesada-dev

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Dangerous Balloons
        run: |
          mkdir -p bin
          gprbuild -P dangerous_balloons.gpr
          mv bin/dangerous-balloons bin/dangerous-balloons-linux-${{ matrix.arch }}
          sha256sum bin/dangerous-balloons-linux-${{ matrix.arch }} > bin/dangerous-balloons-linux-${{ matrix.arch }}.sha256

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dangerous-balloons-binaries-${{ matrix.arch }}
          path: bin/

  build-appimage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          apt-get update
          apt-get install -y gnat gprbuild libncursesada-dev squashfs-tools wget

      - name: Install appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          chmod +x /tmp/appimagetool

      - name: Build AppImage
        run: |
          cd appimage
          ./build-appimage.sh

      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dangerous-balloons-appimage
          path: bin/dangerous-balloons-*-x86_64.AppImage

  release:
    needs: [build, build-appimage]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: dangerous-balloons-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-artifacts/dangerous-balloons-*
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: "Automated Dangerous Balloons release for Linux (amd64, arm64, Desktop AppImage)."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
